<!DOCTYPE html>
<html>
    <body>
        <h2 align="center">Employees Detail</h2>
        <p>01. Personal Information</p>
        <table align="center">
            <tr>
                <td>
                    <form>
                        <label for="efname">Employee Name:</label><br>
                        <input type="text" id="efname" name="efname" placeholder="First Name" required><br>
                    </form>
                </td>
                <td>
                    <form>
                        <label for="elname">Last Name:</label><br>
                        <input type="text" id="elname" name="elname" placeholder="Last Name"><br>
                    </form>
                </td>
            </tr>
                <td>
                    <form>
                        <label for="sdate">Starting Date:</label>
                        <input type="date" id="sdate" name="sdate">
                        </form>
                </td>
                <td>
                    <form>
                        <label for="birthdate">Born Date:</label>
                        <input type="date" id="birthdate" name="birthdate">
                        </form>
                </td>
            <tr>
            <tr>
                <td>
                     <form>
                        <label for="typeem">Type Employee</label>
                        <select id="typeem" name="typeem">
                        <option value="MN">Manager</option>
                        <option value="EM">Employee</option>
                        <option value="BO">Boss</option>
                        </select>
                    </form>
                </td>
                <td>
                    <form>
                        Gender
                        <input type="radio" id="male" name="gender" value="male">
                        <label for="male">Male</label>
                        <input type="radio" id="female" name="gender" value="female">
                        <label for="female">Female</label>
                    </form> 
                </td>
            </tr>
            <tr>
                <td>
                    <form>
                        <label for="position">Position:</label><br>
                        <input type="text" id="position" name="position" placeholder="Input Position"><br>
                    </form>
                </td>
            </tr>
        </table>
        <p>02. Location</p>
        <table align="center">
            <tr>
                <td>
                    <form>
                        <label for="city">City:</label><br>
                        <input type="text" id="city" name="city" placeholder="Input City"><br>
                    </form>
                </td>
                <td>
                    <form>
                        <label for="state">State:</label><br>
                        <input type="text" id="state" name="state" placeholder="Input State"><br>
                    </form>
                </td>
            </tr>
            <tr>
                <td>
                    <form>
                        <label for="zip">Zip:</label><br>
                        <input type="text" id="zip" name="zip" placeholder="Input Zip"><br>
                    </form>
                </td>
                <td>
                    <form>
                        <label for="state">State:</label><br>
                        <textarea name="message" rows="5" cols="10">Here.</textarea>
                    </form>
                </td>
            </tr>
        </table>
    <p>03. Contact Information</p>
    <table align="center">
            <tr>
                <td>
                    <form>
                        <label for="city">Phone:</label><br>
                        <input type="text" id="phone" name="phone" placeholder="Input Phone"><br>
                    </form>
                </td>
                <td>
                    <form>
                        <label for="state">Email:</label><br>
                        <input type="email" id="email" name="email" placeholder="Input Email"><br>
                    </form>
                </td>
            </tr>
        </table><br/>
        <form align="center">
            <input type="submit" value="Register" style='font-size: 11pt'>
        </form>
    </body>
</html>
